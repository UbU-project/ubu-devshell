# Pinned revs for Phase 1 upstream repos.
#
# Record the expected HEAD SHA here each time an upstream repo lands.
# D1 ticket R_* notation → key mapping:
#   R_schemas      → ubu_schemas
#   R_core         → ubu_core
#   R_store        → ubu_store
#   R_planning     → ubu_planning_kernel
#   R_adapter      → ubu_github_adapter
#   R_orchestrator → ubu_orchestrator
#   R_ui           → ubu_ui
#
# Leave a value as "" when a repo has not yet landed.
# show-revs.sh compares these against local checkout HEADs.

[pinned]
