ubu_store           = "e1b1bc5e3adddd27a2f138efab9a4c5701d8ad1c"  # R_store (post-ST6 UniverseState admission)
ubu_planning_kernel = "62c6d7a2f71078d141f7a4b9c91bd78193ee3314"  # R_planning (post-P9_fix/P10 regeneration)
ubu_github_adapter  = "d71a169a889a4c0343b9c1970a2afe8db3c60a17"  # R_adapter
